# Multi-database setup for E2E tests and development.
# Usage: docker compose up -d
# Then set ODBC_TEST_DSN or *_TEST_* env vars (see native/doc/cross_database.md).

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: odbc_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: odbc_test
      MYSQL_USER: odbc
      MYSQL_PASSWORD: odbc
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 2s
      timeout: 5s
      retries: 10

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OdbcTest123!"
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "OdbcTest123!"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1521' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  sqlite-tools:
    image: keinos/sqlite3:latest
    profiles: ["sqlite"]
    command: ["sleep", "infinity"]
    volumes:
      - ./.tmp/sqlite:/data
