output: "lib/infrastructure/native/bindings/odbc_bindings.dart"
headers:
  entry-points:
    - "native/odbc_engine/include/odbc_engine.h"
  include-directives:
    - "native/odbc_engine/include/**"

name: "OdbcBindings"
description: "ODBC Engine Native Bindings"

compiler-opts:
  - "-I"
  - "native/odbc_engine/include"

functions:
  include:
    - "odbc_init"
    - "odbc_connect"
    - "odbc_disconnect"
    - "odbc_get_error"
    - "odbc_get_structured_error"
    - "odbc_get_structured_error_for_connection"
    - "odbc_execute_async"
    - "odbc_async_poll"
    - "odbc_async_get_result"
    - "odbc_async_cancel"
    - "odbc_async_free"
    - "odbc_exec_query"
    - "odbc_stream_start"
    - "odbc_stream_start_async"
    - "odbc_stream_poll_async"
    - "odbc_stream_fetch"
    - "odbc_stream_cancel"
    - "odbc_stream_close"
    - "odbc_pool_create"
    - "odbc_pool_get_connection"
    - "odbc_pool_release_connection"
    - "odbc_pool_health_check"
    - "odbc_pool_get_state"
    - "odbc_pool_close"
