# Comparative benchmarks against SQL Server.
# Runs on workflow_dispatch (manual) or on push to main when native/** changes.
# Uses SQL Server 2022 Docker service; ODBC Driver 17 installed in CI.

name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "native/**"
      - ".github/workflows/benchmark.yml"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "BenchOdbc123!"
          MSSQL_PID: "Developer"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native -> target

      - name: Install ODBC (base)
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc unixodbc-dev libclang-dev llvm

      - name: Install ODBC Driver for SQL Server
        run: |
          sudo rm -f /usr/share/keyrings/microsoft-prod.gpg /etc/apt/sources.list.d/microsoft-prod.list
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17

      - name: Wait for SQL Server
        run: |
          echo "Waiting for SQL Server to accept connections..."
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/localhost/1433) 2>/dev/null; then
              echo "Port 1433 open, waiting 5s for SQL Server to initialize..."
              sleep 5
              echo "SQL Server ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "SQL Server did not start in time"
          exit 1

      - name: Set ODBC_TEST_DSN
        run: |
          echo "ODBC_TEST_DSN=Driver={ODBC Driver 17 for SQL Server};Server=localhost,1433;Database=master;UID=sa;PWD=BenchOdbc123!;TrustServerCertificate=yes;" >> $GITHUB_ENV

      - name: Restore benchmark baseline
        uses: actions/cache@v4
        with:
          path: native/target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ hashFiles('native/odbc_engine/benches/comparative_bench.rs', 'native/odbc_engine/Cargo.toml') }}

      - name: Run benchmarks (with regression check)
        id: bench
        run: |
          cd native
          cargo bench --bench comparative_bench -- --verbose --baseline main 2>&1 | tee benchmark_output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            native/benchmark_output.txt
            native/target/criterion/

      - name: Benchmark summary
        if: always()
        run: |
          if [ -f native/benchmark_output.txt ]; then
            echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 native/benchmark_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
