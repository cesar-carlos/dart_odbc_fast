name: odbc_fast
# v3.2.0 - Multi-result hardening:
#   - M1: collect_multi_results walks every result set in any batch shape
#     (cursor->cursor, rowcount->rowcount, rowcount->cursor, cursor->rowcount).
#     Pre-v3.2 silently dropped trailing items in the last two shapes.
#   - M2: odbc_exec_query_multi accepts pooled connection IDs.
#   - M3: MultiResultItem (Dart) is now a sealed class with two variants.
#   - M4: multi-result wire format gained magic + version (v2). v1 still
#     decoded for backwards compatibility.
#   - M5: NEW odbc_exec_query_multi_params + Dart cadeia completa
#     (executeQueryMultiParams).
#   - M6: executeQueryMulti (single) routes through executeQueryMultiFull's
#     firstResultSetOrNull path; deprecated firstResultSet getter.
#   - M7: getFirstResultSet / firstResultSetOrNull return null instead of
#     fake empty buffer when batch produced no cursors.
# v3.1.0 - Transaction control hardening:
#   - SavepointDialect::Auto resolved via SQLGetInfo at begin (B2 fix).
#   - FFI savepoint_create/_rollback/_release now go through
#     Transaction::savepoint_* with full identifier validation +
#     dialect-aware quoting (B1 / closes A1 regression via FFI).
#   - apply_isolation engine-aware: SQLite (PRAGMA), Db2 (SET CURRENT),
#     Oracle (validate level), Snowflake (skip), Sql92 default.
#   - commit / rollback always restore autocommit (B7).
#   - New TransactionHandle helpers: runWithBegin, withSavepoint, savepoint
#     methods, NativeFinalizer (best-effort token reclaim).
# Breaking changes: MAJOR bumps (2.0.0, 3.0.0)
# New features: MINOR bumps (3.1.0)
# Bug fixes: PATCH bumps (1.0.1, 1.0.2)
# See doc/VERSIONING_STRATEGY.md and CHANGELOG.md for v3.1.x details.
version: 3.2.0
description: Enterprise-grade ODBC data platform for Dart with a Rust native engine, streaming queries, pooling, and structured diagnostics.

homepage: https://github.com/cesar-carlos/dart_odbc_fast
repository: https://github.com/cesar-carlos/dart_odbc_fast
issue_tracker: https://github.com/cesar-carlos/dart_odbc_fast/issues
documentation: https://github.com/cesar-carlos/dart_odbc_fast/blob/main/README.md
license: MIT

environment:
  sdk: ">=3.6.0 <4.0.0"

platforms:
  windows:
  linux:

dependencies:
  code_assets: ^1.0.0
  dotenv: ^4.2.0
  ffi: ^2.1.5
  hooks: ^1.0.0
  logging: ^1.3.0
  meta: ^1.15.0
  opentelemetry: ^0.18.0
  result_dart: ^2.1.1

dev_dependencies:
  benchmark_harness: ^2.4.0
  coverage: ^1.15.0
  ffigen: ^20.1.1
  lints: ^6.0.0
  test: ^1.29.0
  very_good_analysis: ^10.2.0

topics:
  - db
  - database
  - odbc
  - sqlserver
  - postgresql
